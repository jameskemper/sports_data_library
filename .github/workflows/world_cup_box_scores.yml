name: World Cup Box Scores

on:
  schedule:
    - cron: "20 * * * *"   # hourly at :20, June 11 - July 21, 2026 (guard below)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-box-scores:
    runs-on: ubuntu-latest

    steps:
      # Stop running after the tournament (final is July 19, 2026;
      # allow two extra days for stat corrections)
      - name: Check tournament window
        id: window
        run: |
          today=$(date -u +%Y%m%d)
          if [ "$today" -gt "20260721" ]; then
            echo "Tournament is over. Skipping."
            echo "active=false" >> "$GITHUB_OUTPUT"
          else
            echo "active=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout repository
        if: steps.window.outputs.active == 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        if: steps.window.outputs.active == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        if: steps.window.outputs.active == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests

      # ---------------------------
      # Scrape completed matches (raw JSONL, team + player data)
      # ---------------------------
      - name: Scrape World Cup box scores
        if: steps.window.outputs.active == 'true'
        run: |
          python World_Cup/box_scores/box_score_scraper.py

      # ---------------------------
      # Compile CSVs
      # ---------------------------
      - name: Compile team box scores
        if: steps.window.outputs.active == 'true'
        run: |
          python World_Cup/box_scores/box_score_compiler.py

      - name: Compile player box scores
        if: steps.window.outputs.active == 'true'
        run: |
          python World_Cup/player_box_scores/player_box_score_compiler.py

      # ---------------------------
      # Commit & push
      # ---------------------------
      - name: Commit and push changes
        if: steps.window.outputs.active == 'true'
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add World_Cup

          if git diff --cached --quiet; then
            echo "No new data to commit."
          else
            git commit -m "Hourly World Cup box score update $(date -u +'%Y-%m-%d %H:%M UTC')"
            git pull --rebase https://x-access-token:${GH_PAT}@github.com/jameskemper/sports_data_library.git master
            git push https://x-access-token:${GH_PAT}@github.com/jameskemper/sports_data_library.git HEAD:master
          fi
