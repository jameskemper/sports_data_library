name: NFL Box Score Scraper

on:
  schedule:
    - cron: '0 14 * 9-12 2'   # Sep-Dec: every Tuesday 9am Central
    - cron: '0 14 1-15 1 2'   # Jan 1-15: every Tuesday (playoffs)
  workflow_dispatch:
    inputs:
      start_week:
        description: 'Start week (default: 1)'
        default: '1'
      end_week:
        description: 'End week (default: 18)'
        default: '18'
      include_playoffs:
        description: 'Include playoffs (true/false)'
        default: 'true'

permissions:
  contents: write

jobs:
  scrape-nfl-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 pandas

      - name: Run NFL box score scraper
        env:
          START_WEEK:       ${{ github.event.inputs.start_week || '1' }}
          END_WEEK:         ${{ github.event.inputs.end_week || '18' }}
          INCLUDE_PLAYOFFS: ${{ github.event.inputs.include_playoffs || 'true' }}
        run: |
          python NFL/box_scores/box_score_scraper.py

      - name: Commit and push changes
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add NFL/box_scores/
          if git diff --cached --quiet; then
            echo "No new data to commit."
          else
            git commit -m "NFL box score update $(date +'%Y-%m-%d')"
            git pull --rebase https://x-access-token:${GH_PAT}@github.com/jameskemper/sports_data_library.git master
            git push https://x-access-token:${GH_PAT}@github.com/jameskemper/sports_data_library.git HEAD:master
          fi
