name: NCAAF Predictions app

# Runs the Bayesian spread / win-probability model on data that the other
# NCAAF workflows (box scores, ELO, rankings, team stats) have already fetched
# and committed. It therefore does NOT scrape anything itself — it consumes the
# committed CSVs (run with --no-scrape).
#
#   - Tuesday : ingest the weekend's completed games -> update the posterior
#               (model_state/model_current.json) and refresh season accuracy.
#   - Wednesday: predict the upcoming week -> predictions/predictions_<season>.csv
#
# Scheduled an hour after the data workflows' 12:00 UTC runs so the inputs are
# fresh for the same day.

on:
  schedule:
    - cron: "0 13 * 8-12,1 2"   # Tue 13:00 UTC, Aug–Dec & Jan -> update
    - cron: "0 13 * 8-12,1 3"   # Wed 13:00 UTC, Aug–Dec & Jan -> predict
  workflow_dispatch:
    inputs:
      mode:
        description: "predict | update"
        default: "predict"

permissions:
  contents: write

concurrency:
  group: ncaaf-predictions
  cancel-in-progress: false

jobs:
  run-model:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: NCAA_football/predictions

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Update posterior from completed games (Tuesday)
        if: github.event.schedule == '0 13 * 8-12,1 2' || github.event.inputs.mode == 'update'
        run: python run_pipeline.py --mode update --no-scrape

      - name: Predict upcoming week (Wednesday)
        if: github.event.schedule == '0 13 * 8-12,1 3' || github.event.inputs.mode == 'predict'
        run: python run_pipeline.py --mode predict --no-scrape

      - name: Commit and push results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add predictions/ accuracy/ model_state/
          git diff --cached --quiet || (
            git commit -m "Automated model run [skip ci]" &&
            git pull --rebase origin master &&
            git push origin HEAD:master
          )
