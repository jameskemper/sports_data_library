- name: Commit and push changes
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add NCAAW_basketball/box_scores

          if git diff --cached --quiet; then
            echo "No new data to commit."
          else
            git commit -m "Daily NCAAW box score scrape + compile"
            git pull --rebase https://x-access-token:${GH_PAT}@github.com/jameskemper/sports_data_library.git master
            git push https://x-access-token:${GH_PAT}@github.com/jameskemper/sports_data_library.git HEAD:master
          fi
