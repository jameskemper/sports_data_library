name: NBA Box Scores

on:
  schedule:
    - cron: "0 12 * * *"   # ~6am Central, after games finish
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-box-scores:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas nba_api

      # ---------------------------
      # Team box scores
      # ---------------------------
      - name: Fetch current season team box scores
        run: |
          python NBA/box_scores/fetch_box_scores.py

      - name: Compile all team seasons
        run: |
          python NBA/box_scores/compile_box_scores_all_years.py

      # ---------------------------
      # Player box scores
      # ---------------------------
      - name: Fetch current season player box scores
        run: |
          python NBA/player_box_scores/fetch_player_box_scores.py

      - name: Compile all player seasons
        run: |
          python NBA/player_box_scores/compile_player_box_scores_all_years.py

      # ---------------------------
      # Commit & push
      # ---------------------------
      - name: Commit and push changes
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add NBA/box_scores NBA/player_box_scores

          if git diff --cached --quiet; then
            echo "No new data to commit."
          else
            git commit -m "Daily NBA box score update $(date +'%Y-%m-%d')"
            git pull --rebase https://x-access-token:${GH_PAT}@github.com/jameskemper/sports_data_library.git master
            git push https://x-access-token:${GH_PAT}@github.com/jameskemper/sports_data_library.git HEAD:master
          fi
